<!DOCTYPE html>
<html>
<head>
    <title>Solar Car Test</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #eee; padding: 20px; }
        #message-box { font-size: 32px; color: #00aaff; margin-top: 20px; }
        #status { color: yellow; }
    </style>
</head>
<body>
    <h2>WebSocket Test</h2>
    <div id="status">Connecting...</div>
    
    <div id="message-box">Waiting for message...</div>

    <script>
        // Replace with your Toradex's IP address
        const toradexIP = "192.168.8.1"; 
        const wsUrl = `ws://${toradexIP}:8765`;
        
        function connect() {
            const ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                document.getElementById("status").innerText = "Connected";
                document.getElementById("status").style.color = "lime";
            };

            ws.onmessage = function(event) {
                // Directly display the raw text received from the Toradex
                document.getElementById("message-box").innerText = event.data;
            };

            ws.onclose = function() {
                document.getElementById("status").innerText = "Disconnected! Retrying in 2s...";
                document.getElementById("status").style.color = "red";
                // Keep the auto-reconnect loop active for track dropouts
                setTimeout(connect, 2000); 
            };
            
            ws.onerror = function(err) {
                console.error("WebSocket Error: ", err);
                ws.close(); 
            };
        }

        // Start the connection
        connect();
    </script>
</body>
</html>
